version: '3.8'

# Este archivo se combina automáticamente con docker-compose.yml
# Uso: docker-compose up

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - DATABASE_URL=${DATABASE_URL:-postgresql://yapur:yapurpassword@db:5432/yapurlearning}
    volumes:
      # Montar el código fuente para hot reload
      - .:/app
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgresql://yapur:yapurpassword@db:5432/yapurlearning}
    # Remover el restart para poder ver logs en desarrollo
    restart: "no"